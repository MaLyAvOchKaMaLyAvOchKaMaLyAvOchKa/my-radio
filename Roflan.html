<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>МаЛяВоЧка — Рофл звуки</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
}

.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:170px;
    height:100%;
    background:#181818;
    box-shadow:3px 0 10px #000;
    padding-top:120px;
}

.menu{
    display:block;
    color:white;
    text-decoration:none;
    font-size:22px;
    padding:18px;
    transition:.2s;
}

.menu:hover{
    background:#333;
    color:#00ff88;
}

header{
    margin-left:170px;
    background:#181818;
    padding:25px;
    text-align:center;
    font-size:42px;
    font-weight:bold;
    color:#00ff88;
    box-shadow:0 0 20px #000;
}

.song{
    background:#222;
    width:700px;
    margin:20px auto;
    margin-left:250px;
    border-radius:12px;
    padding:15px;
    transition:.2s;
}

.song:hover{
    background:#333;
    transform:scale(1.02);
}

.title{
    font-size:24px;
    margin-bottom:10px;
}

audio{
    width:100%;
}
</style>

</head>

<body>

<div class="sidebar">
    <a href="index.html" class="menu">🎧 Радио</a>
    <a href="Roflan.html" class="menu">😂 Рофл звуки</a>
</div>

<header>
😂 Рофл звуки
</header>

<div class="song">
<div class="title">😂 Название звука</div>
<audio controls onplay="pauseOthers(this)">
<source src="sound1.mp3" type="audio/mpeg">
</audio>
</div>

<div class="song">
<div class="title">💀 Второй звук</div>
<audio controls onplay="pauseOthers(this)">
<source src="sound2.mp3" type="audio/mpeg">
</audio>
</div>

<script>
function pauseOthers(current)
{
    let players=document.querySelectorAll("audio");

    players.forEach(function(player)
    {
        if(player!==current)
        {
            player.pause();
            player.currentTime=0;
        }
    });
}
</script>

</body>
</html>
