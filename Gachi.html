<!-- ===== ЗВУК 1 ===== -->

<div class="song">
<div class="title">🎤 Нурминский — Мент на меня газует</div>

<audio controls onplay="pauseOthers(this)">
<source src="Gachi/SSSR.mp3" type="audio/mpeg">
</audio>

<br><br>

<a class="btn" href="Gachi/SSSR.mp3" download>
⬇️ Скачать
</a>

<button class="btn"
onclick="copyLink('https://malyavochkamalyavochkamalyavochka.github.io/my-radio/Gachi/SSSR.mp3')">
🔗 Скопировать ссылку
</button>
</div>

<script>
function pauseOthers(current)
{
    let players = document.querySelectorAll("audio");

    players.forEach(function(player)
    {
        if(player !== current)
        {
            player.pause();
            player.currentTime = 0;
        }
    });
}

function copyLink(link)
{
    navigator.clipboard.writeText(link)
    .then(() => alert("✅ Ссылка скопирована!"))
    .catch(() => {
        const area = document.createElement("textarea");
        area.value = link;
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        document.body.removeChild(area);
        alert("✅ Ссылка скопирована!");
    });
}
</script>

</body>
